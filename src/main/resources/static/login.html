<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园活动发布平台 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 400px;
            max-width: 90%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .user-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }

        .user-info.show {
            display: block;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .user-info p {
            color: #666;
            margin: 5px 0;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .token-display {
            margin-top: 10px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 5px;
            word-break: break-all;
            font-size: 12px;
            color: #495057;
            display: none;
        }

        .token-display.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>校园活动发布平台</h1>
            <p>Campus Activity Publishing Platform</p>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <button type="button" class="btn-login" onclick="login()">登 录</button>

            <div id="message" class="message"></div>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <a href="register.html" style="color: #667eea; text-decoration: none; font-size: 14px; margin-right: 15px;">立即注册</a>
            <a href="forgot-password.html" style="color: #667eea; text-decoration: none; font-size: 14px;">忘记密码？</a>
        </div>

        <div id="userInfo" class="user-info">
            <h3>登录成功！</h3>
            <p><strong>用户ID:</strong> <span id="userId"></span></p>
            <p><strong>用户名:</strong> <span id="userName"></span></p>
            <p><strong>真实姓名:</strong> <span id="realName"></span></p>
            <p><strong>角色:</strong> <span id="role"></span></p>
            <div id="tokenDisplay" class="token-display">
                <strong>Token:</strong> <span id="token"></span>
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1/users';

        function showMessage(msg, isError = true) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + (isError ? 'error' : 'success');
        }

        function clearMessage() {
            const messageEl = document.getElementById('message');
            messageEl.className = 'message';
            messageEl.textContent = '';
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');

            if (!username || !password) {
                showMessage('请输入用户名和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            clearMessage();

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('登录成功！', false);
                    const data = result.data;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('userInfo').classList.add('show');
                    document.getElementById('userId').textContent = data.userId;
                    document.getElementById('userName').textContent = data.username;
                    document.getElementById('realName').textContent = data.realName;
                    document.getElementById('role').textContent = data.role;
                    document.getElementById('token').textContent = data.token;
                    document.getElementById('tokenDisplay').classList.add('show');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                } else {
                    showMessage(result.message || '登录失败');
                }
            } catch (error) {
                showMessage('网络错误: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('userInfo').classList.remove('show');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            clearMessage();
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
